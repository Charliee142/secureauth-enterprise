{% extends "base.html" %}
{% block content %}
<div class="flex justify-center pt-10">
  <div class="glow-card w-full max-w-md p-8">
    <h1 class="text-xl font-bold text-warning mb-1">⚠ Re-authentication Required</h1>
    <p class="text-slate-400 text-sm mb-6">This is a sensitive action. Please confirm your password to continue.</p>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div>
        <label class="block text-sm mb-1 text-slate-300">Password</label>
        <input type="password" name="password" class="w-full rounded-lg bg-[#020817] border border-cyan-900/50 px-3 py-2 text-sm text-text focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      <button type="submit" class="glow-btn w-full py-2.5 mt-2">Confirm</button>
    </form>
  </div>
</div>
{% endblock %}
