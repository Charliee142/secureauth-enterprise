{% extends "base.html" %}
{% block content %}
<div class="flex justify-center pt-10">
  <div class="glow-card w-full max-w-md p-8">
    <h1 class="text-2xl font-bold text-primary mb-1">Forgot Password</h1>
    <p class="text-slate-400 text-sm mb-6">We'll email you a reset link.</p>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm mb-1 text-slate-300">Email</label>
        {{ form.email }}
      </div>
      <button type="submit" class="glow-btn w-full py-2.5 mt-2">Send Reset Link</button>
    </form>
  </div>
</div>
{% endblock %}
