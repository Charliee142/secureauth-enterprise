{% extends "base.html" %}
{% block content %}
<div class="flex justify-center pt-4">
  <div class="glow-card w-full max-w-md p-8">
    <h1 class="text-2xl font-bold text-primary mb-1">Change Password</h1>
    <form method="post" class="space-y-4 mt-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm mb-1 text-slate-300">Current Password</label>
        {{ form.current_password }}
      </div>
      <div>
        <label class="block text-sm mb-1 text-slate-300">New Password</label>
        {{ form.new_password }}
      </div>
      <div>
        <label class="block text-sm mb-1 text-slate-300">Confirm New Password</label>
        {{ form.new_password_confirm }}
      </div>
      {% if form.non_field_errors %}<p class="text-danger text-sm">{{ form.non_field_errors }}</p>{% endif %}
      <button type="submit" class="glow-btn w-full py-2.5 mt-2">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
