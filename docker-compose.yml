services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secureauth
      POSTGRES_USER: secureauth
      POSTGRES_PASSWORD: secureauth
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secureauth"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
    env_file: .env
    environment:
      DATABASE_URL: postgres://secureauth:secureauth@db:5432/secureauth
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
